<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companion Variable Dashboard</title>
    <!-- Load Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'companion-blue': '#2563eb',
                        'companion-dark': '#1f2937',
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #4b5563;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-track {
            background-color: #1f2937;
        }
        
        /* Overrides for full-screen black canvas */
        body {
            background-color: #000 !important;
            margin: 0;
            overflow: hidden; /* Prevent body scroll, the dashboard handles it */
        }
        #dashboard-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: auto; /* Allows scrolling if windows are placed off-screen */
        }

        /* Variable Window Styles */
.variable-window {
	position: absolute;
	background-color: transparent;          /* transparent BG */
	border: 2px solid transparent;          /* border hidden by default */
	border-radius: 0.5rem;                  /* 0.5rem radius */
	box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
	padding: 0.5rem;
	cursor: move;
	user-select: none;
	overflow: hidden;
	touch-action: none;
	min-width: 100px;
	min-height: 50px;
	transition: border-color 120ms ease;    /* smooth reveal */
}

/* Show border only on hover */
.variable-window:hover {
	border-color: #fff;
}
        
        /* Resizer Handle: hidden until hover */
.resizer {
	position: absolute;
	width: 15px;
	height: 15px;
	right: 0;
	bottom: 0;
	background: rgba(255, 255, 255, 0.5);
	cursor: nwse-resize;
	border-bottom-right-radius: 0.5rem;     /* match window radius */
	z-index: 10;

	opacity: 0;
	visibility: hidden;
	transition: opacity 120ms ease;
}

        /* Content Styles */
        .window-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            pointer-events: none; /* Allows click-through for drag/resize to work correctly */
        }
        .value-display {
            font-size: 3rem; /* Fallback, set by JS dynamically */
            font-weight: 800;
            color: white;
            text-align: center;
            line-height: 1.1; 
            padding: 0 0.2rem;
            pointer-events: none;
            overflow-wrap: break-word;
        }
        .variable-id {
            font-size: 0.75rem;
            color: #9ca3af;
            text-align: center;
            margin-bottom: 0.2rem;
            pointer-events: none;
            overflow-wrap: break-word;
        }
        
        /* Custom Title Position */
        .custom-title {
            position: absolute;
            top: 0.5rem;
            left: 0.5rem;
            font-size: 0.75rem;
            color: white;
            opacity: 0.7;
            pointer-events: none;
            max-width: calc(100% - 3rem); /* Leaves space for the delete button */
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Edit Form Styles */
        .input-form {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: black;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            z-index: 5;
        }
        
        /* Delete Button: hidden until hover */
.delete-button {
	position: absolute;
	top: 0.5rem;
	right: 0.5rem;
	cursor: pointer;
	z-index: 10;
	color: white;
	opacity: 0;                              /* hidden by default */
	visibility: hidden;
	transition: opacity 120ms ease, color 100ms ease;
}

.delete-button:hover { color: #ef4444; }

        
        /* Menu and toggle styles remain the same */
        #sidebar {
            width: 250px;
            background-color: black;
            border-right: 2px solid white;
            padding: 1rem;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 50; /* Increased Z-index for menu */
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out;
            overflow-y: auto;
        }
        #sidebar.open {
            transform: translateX(0);
        }
        #sidebar-toggle {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 60;
            color: white;
            cursor: pointer;
        }

	/* Reveal controls on hover */
.variable-window:hover .delete-button,
.variable-window:hover .resizer {
	opacity: 1;
	visibility: visible;
}
	
    </style>
</head>
<body class="font-sans">

    <!-- Sidebar Element (Menu) -->
    <div id="sidebar">
        <h2 class="text-2xl font-bold text-white mb-6 mt-10">Menu</h2>
        <div class="space-y-6">
            
            <!-- New Variable Button (MOVED HERE) -->
            <button id="add-window-button" class="w-full px-3 py-2 mb-4 bg-white text-black font-semibold rounded-lg hover:bg-gray-300 transition duration-150 ease-in-out flex items-center justify-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                <span>New Variable</span>
            </button>

            <!-- 1. Companion Connection Setup -->
            <h3 class="text-white text-lg border-b border-gray-700 pb-2">Companion connection setup</h3>
            
            <div class="space-y-4">
                <div class="space-y-2">
                    <div>
                        <label for="companion-ip" class="block text-sm font-medium text-gray-400 mb-1">IP Address</label>
                        <input type="text" id="companion-ip" value="192.168.1.10" placeholder="e.g., 192.168.1.10"
                               class="w-full px-2 py-1 bg-gray-900 border border-gray-600 rounded-lg text-sm text-white">
                    </div>
                    <div>
                        <label for="companion-port" class="block text-sm font-medium text-gray-400 mb-1">Port (HTTP)</label>
                        <input type="number" id="companion-port" value="8000" placeholder="e.g., 8000"
                               class="w-full px-2 py-1 bg-gray-900 border border-gray-600 rounded-lg text-sm text-white">
                    </div>
                </div>
            </div>

            <!-- Monitoring Controls -->
            <div class="space-y-2">
                <button id="toggle-monitor-button"
                        class="w-full px-3 py-2 bg-green-600 text-white font-semibold rounded-lg hover:bg-green-700 transition duration-150 ease-in-out">
                    Start Monitoring (1s Interval)
                </button>
                <div id="status-message" class="p-2 text-center rounded-lg text-xs bg-yellow-900 text-yellow-300">
                    Awaiting connection.
                </div>
            </div>

            <!-- 3. Import/Export -->
            <h3 class="text-white text-lg border-b border-gray-700 pb-2 pt-4">Import / Export</h3>
            <div class="space-y-2">
                <button onclick="window.exportToXML()" class="w-full px-3 py-2 bg-gray-600 text-white font-semibold rounded-lg hover:bg-gray-700 transition duration-150 ease-in-out flex items-center justify-center space-x-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M16 17l-4-4m0 0l-4 4m4-4v10" />
                    </svg>
                    <span>Save to XML</span>
                </button>
                <button onclick="window.triggerImportXML()" class="w-full px-3 py-2 bg-gray-600 text-white font-semibold rounded-lg hover:bg-gray-700 transition duration-150 ease-in-out flex items-center justify-center space-x-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M4 12l4-4m0 0l4 4m-4-4v8" />
                    </svg>
                    <span>Load from XML</span>
                </button>
            </div>
        </div>
    </div>
    
    <!-- Menu Toggle Button -->
    <button id="sidebar-toggle">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </button>


    <!-- Main Dashboard Canvas -->
    <div id="dashboard-container">
        <!-- Variable Windows will be appended here by JavaScript -->
        
        <!-- Hidden file input for XML import -->
        <input type="file" id="xml-upload-input" accept=".xml" style="display: none;">
    </div>

    <script type="module">
        // --- Firebase/Auth Setup (Mandatory Boilerplate) ---
        // NOTE: The application state is now managed using LocalStorage for persistence.
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        setLogLevel('Debug');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;

        let db, auth, userId;
        let isAuthReady = false;

        // Dashboard state management
        let variableWindows = []; // Stores objects with id, variableId, value, x, y, width, height, customTitle
        
        // --- Setup (Keeping Firebase Boilerplate but prioritizing LocalStorage) ---
        if (firebaseConfig) {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);

            (async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined') {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    userId = auth.currentUser?.uid || crypto.randomUUID();
                    isAuthReady = true;
                } catch (error) {
                    console.error("Firebase Auth Error:", error);
                }
            })();
        }
        // --- End Firebase Setup ---

        // Global variables for monitoring
        let monitorInterval = null;
        const FETCH_INTERVAL_MS = 1000; 

        // DOM Elements
        const ipInput = document.getElementById('companion-ip');
        const portInput = document.getElementById('companion-port');
        const dashboardContainer = document.getElementById('dashboard-container');
        const statusMessage = document.getElementById('status-message');
        const toggleButton = document.getElementById('toggle-monitor-button');
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const addWindowButton = document.getElementById('add-window-button');
        const xmlUploadInput = document.getElementById('xml-upload-input'); // NEW

        // Drag/Resize State
        let activeWindowId = null;
        let isDragging = false;
        let isResizing = false;
        let startX = 0;
        let startY = 0;
        let startWidth = 0;
        let startHeight = 0;
        let startWindowX = 0;
        let startWindowY = 0;
        
        // =========================================================================
        // IMPORTANT FIX: Moving addNewWindow definition up for early access in loadDashboardState
        // =========================================================================
        
        /**
         * Adds a new variable window to the dashboard.
         */
        window.addNewWindow = function(defaultId = '', doRender = true, defaultTitle = '') {
            // FIX: Calculate center position of the current viewport
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            // Default size for new window
            const windowWidth = 350;
            const windowHeight = 250;

            const newWindow = {
                id: crypto.randomUUID(),
                variableId: defaultId,
                customTitle: defaultTitle, 
                value: '...',
                isEditing: defaultId === '',
                // Center the new window relative to current scroll position
                x: centerX - (windowWidth / 2) + dashboardContainer.scrollLeft, 
                y: centerY - (windowHeight / 2) + dashboardContainer.scrollTop,
                width: windowWidth,
                height: windowHeight
            };
            variableWindows.push(newWindow);
            saveDashboardState();

            // FIX: Collapse the menu panel
            if (sidebar.classList.contains('open')) {
                window.toggleSidebar();
            }

            if (doRender) renderDashboard();
        }
        
        // =========================================================================
        // END FIX SECTION
        // =========================================================================


        /**
         * Toggles the visibility of the sidebar.
         */
        window.toggleSidebar = function() {
            sidebar.classList.toggle('open');
        }

        /**
         * Utility to display status or error messages.
         */
        function setStatus(message, type = 'warning') {
            statusMessage.textContent = message;
            statusMessage.className = 'w-full px-3 py-2 text-center rounded-lg text-xs transition-colors duration-200';
            statusMessage.classList.remove('hidden', 'bg-red-900', 'text-red-300', 'bg-green-900', 'text-green-300', 'bg-yellow-900', 'text-yellow-300');

            if (type === 'error') {
                statusMessage.classList.add('bg-red-900', 'text-red-300');
            } else if (type === 'success') {
                statusMessage.classList.add('bg-green-900', 'text-green-300');
            } else { // warning/info
                statusMessage.classList.add('bg-yellow-900', 'text-yellow-300');
            }
        }

        /**
         * Loads the dashboard state from LocalStorage or initializes default state.
         */
        function loadDashboardState() {
            const savedIP = localStorage.getItem('companionIP');
            const savedPort = localStorage.getItem('companionPort');
            const savedWindows = localStorage.getItem('companionWindows');

            if (savedIP) ipInput.value = savedIP;
            if (savedPort) portInput.value = savedPort;

            if (savedWindows) {
                try {
                    variableWindows = JSON.parse(savedWindows);
                    // Ensure any ongoing edits are cleared on load
                    variableWindows.forEach(win => win.isEditing = false);
                } catch (e) {
                    console.error("Error parsing saved state from localStorage:", e);
                    variableWindows = [];
                }
            }

            if (variableWindows.length === 0) {
                // Initialize with one default window if none exist
                window.addNewWindow('internal:time_hms', false, 'System Time'); 
            }
            renderDashboard();
        }

        /**
         * Saves the current dashboard state and settings to LocalStorage.
         */
        function saveDashboardState() {
            // 1. Save settings
            localStorage.setItem('companionIP', ipInput.value.trim());
            localStorage.setItem('companionPort', portInput.value.trim());

            // 2. Save window state
            // Clean up state before saving (only keep necessary properties for localStorage)
            const stateToSave = variableWindows.map(win => ({
                id: win.id,
                variableId: win.variableId,
                customTitle: win.customTitle, 
                x: win.x,
                y: win.y,
                width: win.width,
                height: win.height,
            }));

            localStorage.setItem('companionWindows', JSON.stringify(stateToSave));
        }

        /**
         * Calculates and sets the font size for the variable value display based on window size.
         */
        function setDynamicFontSize(windowElement) {
            const width = windowElement.offsetWidth;
            const height = windowElement.offsetHeight;
            
            if (width === 0 || height === 0) return; 

            // Calculate font size to fit width and height of the window's content area
            const contentWidth = width - 10; // Minus padding
            const contentHeight = height - 30; // Minus ID line and padding

            // Width factor: 20% of content width (aggressive, but ensures fill)
            const widthBasedSize = Math.floor(contentWidth * 0.20); 
            // Height factor: 50% of content height (since line-height is 1.1)
            const heightBasedSize = Math.floor(contentHeight * 0.50);

            // Use the smaller size to prevent text overflow in either dimension
            const finalFontSize = Math.min(widthBasedSize, heightBasedSize);

            const valueDisplay = windowElement.querySelector('.value-display');
            if (valueDisplay) {
                valueDisplay.style.fontSize = `${finalFontSize}px`;
            }
        }

        /**
         * Renders the dashboard based on the current `variableWindows` state.
         */
        function renderDashboard() {
            dashboardContainer.innerHTML = '';
            
            variableWindows.forEach((win, index) => {
                const windowElement = document.createElement('div');
                windowElement.className = 'variable-window';
                windowElement.id = `win-${win.id}`;
                windowElement.setAttribute('data-index', index);
                
                // Set position and size
                windowElement.style.left = `${win.x}px`;
                windowElement.style.top = `${win.y}px`;
                windowElement.style.width = `${win.width}px`;
                windowElement.style.height = `${win.height}px`;

                // Set drag listener on the window body
                windowElement.addEventListener('mousedown', (e) => window.handleDragStart(e, win.id));
                windowElement.addEventListener('touchstart', (e) => window.handleTouchStart(e, win.id, 'drag'));


                if (!win.variableId || win.isEditing) {
                    // Input form when editing or empty
                    windowElement.innerHTML = `
                        <form class="input-form" onsubmit="window.submitVariable(event, '${win.id}')">
                            <h4 class="text-white text-lg">Set Variable</h4>
                            
                            <!-- Custom Title Input -->
                            <div>
                                <label for="title-input-${win.id}" class="block text-sm font-medium text-gray-400 mb-1">Custom Title (Optional)</label>
                                <input type="text" id="title-input-${win.id}" value="${win.customTitle || ''}" placeholder="e.g., Time"
                                    class="w-full text-center px-3 py-2 bg-gray-900 border border-white rounded-md text-sm text-white focus:ring-2 focus:ring-companion-blue">
                            </div>

                            <div>
                                <label for="input-${win.id}" class="block text-sm font-medium text-gray-400 mb-1">Variable ID (Required)</label>
                                <input type="text" id="input-${win.id}" value="${win.variableId || ''}" placeholder="internal:time_hms" 
                                    class="w-full text-center px-3 py-2 bg-gray-900 border border-white rounded-md text-sm text-white focus:ring-2 focus:ring-companion-blue" required>
                            </div>
                            
                            <!-- NEW BUTTONS ROW: Monitor and Cancel -->
                            <div class="flex space-x-2 w-full">
                                <button type="button" onclick="window.cancelEdit('${win.id}')" class="w-1/2 py-2 bg-red-600 text-white font-semibold rounded-md hover:bg-red-700 transition duration-150 ease-in-out">Cancel</button>
                                <button type="submit" class="w-1/2 py-2 bg-green-600 text-white font-semibold rounded-md hover:bg-green-700 transition duration-150 ease-in-out">Monitor</button>
                            </div>
                        </form>
                    `;
                    // Auto-focus the variable input field
                    setTimeout(() => document.getElementById(`input-${win.id}`)?.focus(), 0);
                } else {
                    // Window monitoring a variable
                    const titleToDisplay = win.customTitle || win.variableId;

                    windowElement.innerHTML = `
                        <div class="delete-button" onclick="window.deleteWindow('${win.id}')">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <span class="custom-title">${titleToDisplay}</span> <!-- Custom Title Display -->
                        <div class="window-content">
                            <!-- Removed .variable-id span, replaced by custom-title if empty -->
                            <div id="value-${win.id}" class="value-display">${win.value || '...'}</div>
                        </div>
                        <div class="resizer" onmousedown="window.handleResizeStart(event, '${win.id}')" ontouchstart="window.handleTouchStart(event, '${win.id}', 'resize')"></div>
                    `;
                    
                    // Add double-click to edit on the content area
                    windowElement.querySelector('.window-content').addEventListener('dblclick', (e) => {
                        // Prevent dblclick from triggering a drag end event sequence
                        e.stopPropagation(); 
                        window.startEdit(win.id);
                    });
                }

                dashboardContainer.appendChild(windowElement);
            });
            
            // Apply font sizing after DOM update
            setTimeout(() => {
                document.querySelectorAll('.variable-window').forEach(setDynamicFontSize);
            }, 50);

            // Re-fetch variables if monitoring is active (to update values after render)
            if (monitorInterval) {
                 fetchVariable();
            }
        }
        
        /**
         * Starts the editing mode for a window.
         */
        window.startEdit = function(id) {
            const win = variableWindows.find(w => w.id === id);
            if (win) {
                win.isEditing = true;
                renderDashboard();
            }
        }

        /**
         * Cancels editing mode. If the window is empty (newly created), it deletes it.
         */
        window.cancelEdit = function(id) {
            const win = variableWindows.find(w => w.id === id);
            if (!win) return;

            // Check if the window is truly empty (meaning it was newly added and never monitored)
            if (!win.variableId && !win.customTitle) {
                // If brand new and empty, delete it
                window.deleteWindow(id);
            } else {
                // If it had a value, just exit edit mode (its state remains preserved in variableWindows)
                win.isEditing = false;
                renderDashboard();
            }
        };


        /**
         * Deletes a variable window.
         */
        window.deleteWindow = function(id) {
             const win = variableWindows.find(w => w.id === id);
             if (!win) return;
             
             const confirmationMessage = `Are you sure you want to delete the monitor for ${win.customTitle || win.variableId || 'this empty window'}?`;
             if (!confirm(confirmationMessage)) {
                return;
             }
            
            variableWindows = variableWindows.filter(w => w.id !== id);
            saveDashboardState();
            renderDashboard();
        }

        /**
         * Submits the variable ID and custom title from the input form.
         */
        window.submitVariable = function(event, id) {
            event.preventDefault();
            const inputVariable = document.getElementById(`input-${id}`);
            const inputTitle = document.getElementById(`title-input-${id}`); // NEW: Get title input

            let newVariableId = inputVariable.value.trim();
            let newCustomTitle = inputTitle.value.trim(); // NEW: Get title value
            
            // Sanitize the input to strip Companion's $( ) wrapper
            if (newVariableId.startsWith('$(') && newVariableId.endsWith(')')) {
                newVariableId = newVariableId.substring(2, newVariableId.length - 1);
            }

            if (!newVariableId.includes(':')) {
                setStatus('Invalid format. Variable ID requires "label:name" (e.g., internal:time_hms).', 'error');
                return;
            }

            const win = variableWindows.find(w => w.id === id);
            if (win) {
                win.variableId = newVariableId;
                win.customTitle = newCustomTitle; // NEW: Save title
                win.isEditing = false;
                win.value = '...';
                
                saveDashboardState();
                renderDashboard();
                
                if (monitorInterval) {
                    fetchVariable();
                }
            }
        }
        
        // --- XML Import/Export Functions ---

        /**
         * Prompts the user for a filename, converts the current window state into an XML string, and downloads it.
         */
        window.exportToXML = function() {
            // FIX: Prompt user for filename
            const defaultFilename = 'companion_dashboard_export';
            const filename = prompt("Enter a filename for the XML export:", defaultFilename);
            
            if (!filename) {
                setStatus('XML export cancelled.', 'warning');
                return;
            }
            
            // Sanitize filename and append extension
            const sanitizedFilename = filename.replace(/[^\w\s-]/g, '').trim() + '.xml';

            const serializer = new XMLSerializer();
            const doc = document.implementation.createDocument(null, 'CompanionDashboard');
            const root = doc.documentElement;

            // 1. Save Settings
            const settings = doc.createElement('Settings');
            settings.setAttribute('ip', ipInput.value.trim());
            settings.setAttribute('port', portInput.value.trim());
            root.appendChild(settings);

            // 2. Save Windows
            const windowsElement = doc.createElement('Windows');
            variableWindows.forEach(win => {
                const winElement = doc.createElement('Window');
                winElement.setAttribute('id', win.id);
                winElement.setAttribute('x', win.x);
                winElement.setAttribute('y', win.y);
                winElement.setAttribute('width', win.width);
                winElement.setAttribute('height', win.height);
                winElement.setAttribute('variableId', win.variableId);
                winElement.setAttribute('customTitle', win.customTitle || '');
                windowsElement.appendChild(winElement);
            });
            root.appendChild(windowsElement);

            const xmlString = serializer.serializeToString(doc);

            // Trigger file download
            const blob = new Blob([xmlString], { type: 'application/xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = sanitizedFilename; // Use the sanitized filename
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            setStatus(`Dashboard saved to ${sanitizedFilename}`, 'success');
        };

        /**
         * Triggers the hidden file input to allow the user to select an XML file.
         */
        window.triggerImportXML = function() {
            xmlUploadInput.click();
        };

        /**
         * Parses the selected XML file and loads the dashboard state.
         */
        window.importFromXML = function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const xmlString = e.target.result;
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlString, 'application/xml');

                    if (xmlDoc.getElementsByTagName('parsererror').length > 0) {
                        throw new Error("Invalid XML file structure.");
                    }

                    const newWindows = [];
                    const windowNodes = xmlDoc.getElementsByTagName('Window');

                    // 1. Parse Settings
                    const settingsNode = xmlDoc.getElementsByTagName('Settings')[0];
                    if (settingsNode) {
                         ipInput.value = settingsNode.getAttribute('ip') || ipInput.value;
                         portInput.value = settingsNode.getAttribute('port') || portInput.value;
                         localStorage.setItem('companionIP', ipInput.value);
                         localStorage.setItem('companionPort', portInput.value);
                    }

                    // 2. Parse Windows
                    for (let i = 0; i < windowNodes.length; i++) {
                        const node = windowNodes[i];
                        const winData = {
                            id: node.getAttribute('id') || crypto.randomUUID(),
                            x: parseFloat(node.getAttribute('x')) || 50,
                            y: parseFloat(node.getAttribute('y')) || 50,
                            width: parseFloat(node.getAttribute('width')) || 350,
                            height: parseFloat(node.getAttribute('height')) || 250,
                            variableId: node.getAttribute('variableId') || '',
                            customTitle: node.getAttribute('customTitle') || '',
                            value: '...',
                            isEditing: false
                        };
                        newWindows.push(winData);
                    }

                    if (newWindows.length === 0) {
                        setStatus('XML imported but no valid Window data found.', 'warning');
                        return;
                    }

                    variableWindows = newWindows;
                    saveDashboardState();
                    renderDashboard();
                    setStatus(`Successfully loaded ${newWindows.length} windows from XML.`, 'success');

                } catch (error) {
                    console.error("XML Import Error:", error);
                    setStatus(`Failed to load XML: ${error.message || 'Invalid file format.'}`, 'error');
                }
            };
            reader.readAsText(file);
        };

        // --- Dragging and Resizing Handlers ---

        function getWindowElement(id) {
             return document.getElementById(`win-${id}`);
        }
        
        window.handleDragStart = function(e, id) {
            if (e.target.classList.contains('resizer') || e.target.classList.contains('delete-button') || e.target.closest('.input-form')) {
                // Ignore drag if clicking on resizer, delete button, or input form
                return;
            }
            if (e.button !== 0 && !e.touches) return; // Only listen to left mouse button or touch
            
            activeWindowId = id;
            const winElement = getWindowElement(id);
            const win = variableWindows.find(w => w.id === id);

            if (winElement && win) {
                isDragging = true;
                winElement.style.cursor = 'grabbing';
                
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                startX = clientX;
                startY = clientY;
                startWindowX = win.x;
                startWindowY = win.y;
                
                // Bring the window to the front
                winElement.style.zIndex = variableWindows.length + 10;
            }
        }

        window.handleResizeStart = function(e, id) {
            e.stopPropagation(); // Prevent drag from starting simultaneously
            if (e.button !== 0 && !e.touches) return; 

            activeWindowId = id;
            const winElement = getWindowElement(id);
            const win = variableWindows.find(w => w.id === id);

            if (winElement && win) {
                isResizing = true;
                
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                startX = clientX;
                startY = clientY;
                startWidth = win.width;
                startHeight = win.height;
                
                // Bring the window to the front
                winElement.style.zIndex = variableWindows.length + 10;
            }
        }

        window.handleDragMove = function(e) {
            if (!isDragging && !isResizing) return;
            
            // Get clientX/clientY from touch or mouse event
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const winElement = getWindowElement(activeWindowId);
            const win = variableWindows.find(w => w.id === activeWindowId);
            if (!winElement || !win) return;

            const deltaX = clientX - startX;
            const deltaY = clientY - startY;

            if (isDragging) {
                // Dragging logic
                win.x = startWindowX + deltaX;
                win.y = startWindowY + deltaY;
                
                winElement.style.left = `${win.x}px`;
                winElement.style.top = `${win.y}px`;
            } else if (isResizing) {
                // Resizing logic
                const newWidth = startWidth + deltaX;
                const newHeight = startHeight + deltaY;
                
                if (newWidth >= 100) { // Min width 100px
                    win.width = newWidth;
                    winElement.style.width = `${newWidth}px`;
                }
                if (newHeight >= 50) { // Min height 50px
                    win.height = newHeight;
                    winElement.style.height = `${newHeight}px`;
                }
                
                // Update font size while resizing for immediate visual feedback
                setDynamicFontSize(winElement);
            }
        }

        window.handleDragEnd = function(e) {
            if (isDragging || isResizing) {
                isDragging = false;
                isResizing = false;
                
                const winElement = getWindowElement(activeWindowId);
                if (winElement) {
                    winElement.style.cursor = 'move';
                    winElement.style.zIndex = 1; // Reset Z-index
                }
                
                // Persist the final position/size
                saveDashboardState();
                activeWindowId = null;
            }
        }

        window.handleTouchStart = function(e, id, type) {
            e.stopPropagation(); // Stop propagation for touch events
            e.preventDefault();
            
            // Map touch start to drag/resize start handlers
            const event = { touches: e.touches, target: e.target };
            if (type === 'drag') {
                window.handleDragStart(event, id);
            } else if (type === 'resize') {
                window.handleResizeStart(event, id);
            }
        }

        
        // --- Companion API Fetch Logic (Reused) ---

        async function fetchVariable() {
            const ip = ipInput.value.trim();
            const port = portInput.value.trim();
            
            if (!ip || !port) {
                setStatus('Companion IP and Port are required.', 'error');
                return;
            }

            const activeWindows = variableWindows.filter(win => win.variableId && !win.isEditing);
            
            if (activeWindows.length === 0) {
                 if (monitorInterval) {
                    setStatus('Monitoring is active but no variables are configured.', 'warning');
                 }
                return;
            }
            
            for (let i = 0; i < activeWindows.length; i++) {
                const win = activeWindows[i];
                const fullVariableId = win.variableId;
                const parts = fullVariableId.split(':');
                const connectionLabel = parts[0];
                const variableName = parts[1];

                let url = `http://${ip}:${port}/api/variable/${encodeURIComponent(connectionLabel)}/${encodeURIComponent(variableName)}/value`;
                url += `?_t=${Date.now()}`; 

                try {
                    const response = await fetch(url, { 
                        method: 'GET',
                        cache: 'no-store' 
                    });

                    const valueElement = document.getElementById(`value-${win.id}`);
                    const windowElement = getWindowElement(win.id);
                    
                    if (response.ok) {
                        const fetchedValue = await response.text();
                        
                        // FIX: Replace the literal newline string characters (\n) with a <br> tag
                        const value = fetchedValue.replace(/\\n/g, '<br>') || 'N/A';
                        
                        win.value = value;
                        if (valueElement) {
                            // IMPORTANT: Use innerHTML to render the <br> tag correctly
                            valueElement.innerHTML = value; 
                            valueElement.style.color = 'white';
                        }
                        
                        // Re-calculate font size after fetch in case text length changed and needs resizing
                        if (windowElement) setDynamicFontSize(windowElement);

                        if (monitorInterval) {
                             setStatus(`Monitoring active: ${activeWindows.length} variables updating every 1 second.`, 'success');
                        }
                    } else {
                        win.value = 'ERR';
                        if (valueElement) {
                            valueElement.textContent = 'ERR';
                            valueElement.style.color = 'red';
                        }
                        console.error(`Error fetching ${fullVariableId}: HTTP ${response.status}`);
                        setStatus(`Error: HTTP ${response.status} fetching ${fullVariableId}.`, 'error');
                    }
                } catch (error) {
                    win.value = 'NET';
                    const valueElement = document.getElementById(`value-${win.id}`);
                    if (valueElement) {
                        valueElement.textContent = 'NET';
                        valueElement.style.color = 'red';
                    }
                    console.error(`Network error fetching ${fullVariableId}:`, error);
                    setStatus(`Network Error: Cannot reach Companion at ${ip}:${port}.`, 'error');
                }
            }
        }

        window.toggleMonitoring = function() {
            if (monitorInterval) {
                clearInterval(monitorInterval);
                monitorInterval = null;
                toggleButton.classList.remove('bg-red-600', 'hover:bg-red-700');
                toggleButton.classList.add('bg-green-600', 'hover:bg-green-700');
                toggleButton.textContent = 'Start Monitoring (1s Interval)';
                setStatus('Monitoring stopped.', 'info');
            } else {
                fetchVariable(); 
                monitorInterval = setInterval(fetchVariable, FETCH_INTERVAL_MS);
                toggleButton.classList.remove('bg-green-600', 'hover:bg-green-700');
                toggleButton.classList.add('bg-red-600', 'hover:bg-red-700');
                toggleButton.textContent = 'Stop Monitoring';
                setStatus(`Monitoring started, updating every ${FETCH_INTERVAL_MS / 1000} second.`, 'success');
            }
        }
        
        // --- Event Listeners Setup ---
        
        window.onload = function() {
            // Load state from localStorage immediately
            loadDashboardState();
            
            // Sidebar toggle
            sidebarToggle.addEventListener('click', window.toggleSidebar);
            
            // Add window button
            addWindowButton.addEventListener('click', () => window.addNewWindow());

            // XML file upload listener
            xmlUploadInput.addEventListener('change', window.importFromXML);

            // Monitoring button
            toggleButton.addEventListener('click', window.toggleMonitoring);

            // Dashboard move/resize listeners (replaces inline attributes)
            dashboardContainer.addEventListener('mousemove', window.handleDragMove);
            dashboardContainer.addEventListener('mouseup', window.handleDragEnd);
            dashboardContainer.addEventListener('touchmove', (e) => {
                if (!isDragging && !isResizing) return;
                window.handleDragMove(e);
            }, { passive: false });
            dashboardContainer.addEventListener('touchend', window.handleDragEnd);
        };

        // Expose helper functions globally for use by dynamically generated content
        window.startEdit = startEdit;
        window.deleteWindow = deleteWindow;
        window.submitVariable = submitVariable;
        window.cancelEdit = cancelEdit; // NEW: Expose cancelEdit
        window.exportToXML = exportToXML; // NEW: Expose export
        window.importFromXML = importFromXML; // NEW: Expose import
        window.triggerImportXML = triggerImportXML; // NEW: Expose trigger

        window.handleDragStart = handleDragStart;
        window.handleResizeStart = handleResizeStart;
        window.handleTouchStart = handleTouchStart;
        window.handleDragMove = handleDragMove;
        window.handleDragEnd = handleDragEnd;

        // Re-calculate font size on window resize
        window.addEventListener('resize', renderDashboard);
    </script>
</body>
</html>
